<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fetih Klinik | Clinic Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a; --card-bg: #1e293b; --text-main: #f8fafc;
            --text-dim: #94a3b8; --ruby-red: #e63946; --success: #2ecc71;
            --border: #334155; --input-bg: #0f172a; --warning: #f59e0b;
        }
        [data-theme="light"] {
            --bg-color: #f1f5f9; --card-bg: #ffffff; --text-main: #1e293b;
            --text-dim: #64748b; --border: #e2e8f0; --input-bg: #ffffff;
        }
        * { box-sizing: border-box; transition: background 0.2s, color 0.2s; }
        body { font-family: 'Inter', 'Cairo', sans-serif; background: var(--bg-color); color: var(--text-main); margin: 0; overflow-x: hidden; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        #toast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: var(--success); color: white; padding: 12px 30px; border-radius: 50px;
            font-weight: 700; z-index: 20000; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: flex; align-items: center; gap: 10px; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #toast.show { top: 20px; }

        .header { background: var(--card-bg); padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--border); }
        .logo { font-size: 22px; font-weight: 800; color: var(--ruby-red); text-decoration: none; }
        .btn-nav { background: var(--input-bg); color: var(--text-main); border: 1px solid var(--border); padding: 8px 12px; border-radius: 10px; cursor: pointer; font-weight: 600; }

        .container { padding: 20px; max-width: 1200px; margin: 0 auto; }

        .category-section { margin-bottom: 20px; }
        .category-label { font-size: 12px; font-weight: 700; color: var(--text-dim); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; }
        .category-scroll { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 6px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
        .category-scroll::-webkit-scrollbar { height: 4px; }
        .category-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        .cat-card {
            flex-shrink: 0; background: var(--card-bg); border: 2px solid var(--border);
            border-radius: 14px; padding: 10px 18px; cursor: pointer;
            font-weight: 700; font-size: 13px; white-space: nowrap;
            display: flex; align-items: center; gap: 8px;
        }
        .cat-card:hover { border-color: var(--ruby-red); }
        .cat-card.active { border-color: var(--ruby-red); background: rgba(230,57,70,0.12); color: var(--ruby-red); }
        .cat-card .cat-count { background: var(--input-bg); color: var(--text-dim); border-radius: 20px; padding: 2px 8px; font-size: 11px; font-weight: 600; }
        .cat-card.active .cat-count { background: rgba(230,57,70,0.2); color: var(--ruby-red); }

        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 25px; }
        @media (min-width: 768px) { .stats-grid { grid-template-columns: repeat(6, 1fr); } }
        .stat-item { background: var(--card-bg); padding: 15px 10px; border-radius: 18px; text-align: center; cursor: pointer; border: 2px solid transparent; }
        .stat-item.active { border-color: var(--ruby-red); background: rgba(230,57,70,0.05); }
        .stat-item b { display: block; font-size: 24px; color: var(--ruby-red); }
        .stat-item small { font-size: 11px; color: var(--text-dim); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }

        .card { background: var(--card-bg); border-radius: 22px; padding: 22px; border: 1px solid var(--border); position: relative; overflow: hidden; }

        .progress-container { background: var(--input-bg); height: 8px; border-radius: 10px; margin: 12px 0; overflow: hidden; }
        .progress-bar { height: 100%; transition: width 0.5s ease; }

        /* ── Expiry badge ── */
        .expiry-row { display: flex; align-items: center; gap: 6px; margin: 8px 0 12px; }
        .expiry-badge {
            display: inline-flex; align-items: center; gap: 5px;
            border-radius: 8px; padding: 5px 12px; font-size: 12px; font-weight: 700;
        }
        .expiry-ok   { background: rgba(46,204,113,0.15);  color: #2ecc71; }
        .expiry-warn { background: rgba(245,158,11,0.15);  color: #f59e0b; }
        .expiry-bad  { background: rgba(230,57,70,0.15);   color: #e63946; }
        .expiry-none { background: rgba(148,163,184,0.15); color: #94a3b8; }

        .qty-wrapper { display: flex; align-items: center; justify-content: space-between; background: var(--input-bg); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 15px; }
        .qty-btn { background: none; border: none; color: var(--text-main); padding: 10px 18px; cursor: pointer; font-size: 20px; font-weight: bold; }
        .qty-input { width: 60px; border: none; background: none; color: var(--text-main); text-align: center; font-size: 18px; font-weight: 800; outline: none; }

        .btn-action { width: 100%; background: var(--ruby-red); color: white; padding: 14px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 15px; }
        .btn-action:disabled { background: var(--border); cursor: not-allowed; }

        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal-box { background: var(--card-bg); padding: 35px; border-radius: 28px; width: 92%; max-width: 450px; }
        input, select { width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px; background: var(--input-bg); border: 1px solid var(--border); color: var(--text-main); outline: none; }

        #loader { position: fixed; inset: 0; background: var(--bg-color); display: none; align-items: center; justify-content: center; z-index: 9999; }
    </style>
</head>
<body lang="tr">

<div id="toast"><i class="fas fa-check-circle"></i> <span id="toastMsg">Başarıyla İşlendi!</span></div>

<div id="loginOverlay" style="position:fixed;inset:0;background:var(--bg-color);z-index:10000;display:flex;align-items:center;justify-content:center;">
    <div style="background:var(--card-bg);padding:40px;border-radius:24px;text-align:center;width:90%;max-width:400px;">
        <h2>Klinik Girişi</h2>
        <input type="text" id="loginID" placeholder="Kullanıcı Adı">
        <input type="password" id="loginPass" placeholder="Şifre">
        <button class="btn-action" onclick="checkLogin()" style="margin-top:10px;">Giriş Yap</button>
    </div>
</div>

<div id="loader"><i class="fas fa-spinner fa-spin fa-3x" style="color:var(--ruby-red)"></i></div>

<header class="header">
    <a href="#" class="logo">FETIH KLINIK</a>
    <div style="display:flex;gap:10px;">
        <button class="btn-nav" onclick="openReports()"><i class="fas fa-file-excel"></i> <span data-key="navRep">Raporlar</span></button>
        <select id="langMenu" onchange="updateLang()" style="width:auto;padding:5px;">
            <option value="tr">TR</option>
            <option value="en">EN</option>
            <option value="ar">AR</option>
        </select>
        <button class="btn-nav" onclick="toggleTheme()"><i class="fas fa-adjust"></i></button>
    </div>
</header>

<div class="container">
    <div class="category-section">
        <div class="category-label" data-key="catLabel">Kategoriler</div>
        <div class="category-scroll" id="categoryRow"></div>
    </div>

    <div class="stats-grid">
        <div class="stat-item active" onclick="setFilter('all',this)">
            <small data-key="sAll">Toplam</small><b id="c-all">0</b>
        </div>
        <div class="stat-item" onclick="setFilter('available',this)">
            <small data-key="sAvail">Stokta</small><b id="c-avail">0</b>
        </div>
        <div class="stat-item" onclick="setFilter('critical',this)">
            <small data-key="sCrit">Kritik</small><b id="c-crit">0</b>
        </div>
        <div class="stat-item" onclick="setFilter('out',this)">
            <small data-key="sOut">Bitti</small><b id="c-out">0</b>
        </div>
        <div class="stat-item" onclick="setFilter('expiring',this)">
            <small data-key="sExpWarn">⚠️ Son. Yakın</small><b id="c-expwarn">0</b>
        </div>
        <div class="stat-item" onclick="setFilter('expired',this)">
            <small data-key="sExpBad">🔴 Süresi Doldu</small><b id="c-expbad">0</b>
        </div>
    </div>

    <input type="text" id="searchInp" placeholder="Ara..." onkeyup="renderUI()"
        style="width:100%;padding:15px;border-radius:12px;margin-bottom:20px;background:var(--card-bg);border:1px solid var(--border);color:var(--text-main);">

    <div class="grid" id="invGrid"></div>
</div>

<!-- Report Modal -->
<div class="overlay" id="reportOverlay">
    <div class="modal-box">
        <h3 data-key="rTitle">Rapor Merkezi</h3>
        <select id="reportType" onchange="toggleDateGroup()">
            <option value="usage"     data-key-opt="rUsage">Tüketim Geçmişi</option>
            <option value="inventory" data-key-opt="rInv">Mevcut Stok</option>
        </select>
        <div id="dateGroup">
            <label data-key="rFrom">Başlangıç:</label><input type="date" id="dateFrom">
            <label data-key="rTo">Bitiş:</label><input type="date" id="dateTo">
        </div>
        <button class="btn-action" onclick="generateReport()" style="margin-top:20px;" data-key="rBtn">İndir</button>
        <button class="btn-action" style="background:none;color:var(--text-dim);margin-top:8px;" onclick="closeReports()" data-key="rClose">Kapat</button>
    </div>
</div>

<!-- Order Modal -->
<div class="overlay" id="orderOverlay">
    <div class="modal-box">
        <h3 id="mMedName">Ürün</h3>
        <p id="mQtyText" style="color:var(--ruby-red);font-weight:800;margin:4px 0;"></p>
        <div id="mExpiryWrap" style="margin:10px 0;"></div>
        <label data-key="wCode">Personel Kodu:</label>
        <input type="text" id="workerCode" placeholder="çalışan adı">
        <div style="display:flex;gap:10px;margin-top:10px;">
            <button class="btn-action" style="background:#475569" onclick="closeOrder()" data-key="bCancel">İptal</button>
            <button class="btn-action" id="confirmBtn" onclick="processOrder()" data-key="bConfirm">Onayla</button>
        </div>
    </div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwStgbIbwfUDZXidMkg1qlSt1YJrp8lhSg1tSNJpA8YKTgkedns6TOLGgamTkyUBnKEAw/exec";

const TRANSLATIONS = {
    tr: {
        navRep:"Raporlar", catLabel:"Kategoriler", catAll:"Tümü",
        sAll:"Toplam", sAvail:"Stokta", sCrit:"Kritik", sOut:"Bitti",
        sExpWarn:"⚠️ Son. Yakın", sExpBad:"🔴 Süresi Doldu",
        rTitle:"Rapor Merkezi", rBtn:"İndir", rClose:"Kapat", rFrom:"Başlangıç:", rTo:"Bitiş:",
        rUsage:"Tüketim Geçmişi", rInv:"Mevcut Stok",
        wCode:"Personel Kodu:", bConfirm:"Onayla", bCancel:"İptal",
        stock:"Stok", use:"KULLAN", out:"BİTTİ",
        search:"Ara...", successMsg:"Başarıyla İşlendi!",
        amountLabel:"Miktar:", workerRequired:"Personel Kodu Gerekli!",
        noData:"Veri Bulunamadı", reportError:"Rapor Hatası", reportSheetName:"Rapor",
        expLabel:"Son Kullanma:", expExpired:"SÜRESİ DOLDU", expDaysLeft:"gün kaldı", expOk:"Geçerli", expNone:"Belirtilmemiş"
    },
    en: {
        navRep:"Reports", catLabel:"Categories", catAll:"All",
        sAll:"Total", sAvail:"In Stock", sCrit:"Critical", sOut:"Empty",
        sExpWarn:"⚠️ Expiring Soon", sExpBad:"🔴 Expired",
        rTitle:"Report Center", rBtn:"Download", rClose:"Close", rFrom:"From:", rTo:"To:",
        rUsage:"Consumption History", rInv:"Current Inventory",
        wCode:"Worker Code:", bConfirm:"Confirm", bCancel:"Cancel",
        stock:"Stock", use:"USE", out:"OUT",
        search:"Search...", successMsg:"Successfully Dispensed!",
        amountLabel:"Amount:", workerRequired:"Worker Code Required!",
        noData:"No Data Found", reportError:"Report Error", reportSheetName:"Report",
        expLabel:"Expiry:", expExpired:"EXPIRED", expDaysLeft:"days left", expOk:"Valid", expNone:"Not Set"
    },
    ar: {
        navRep:"التقارير", catLabel:"الفئات", catAll:"الكل",
        sAll:"الكل", sAvail:"متاح", sCrit:"حرج", sOut:"نفذ",
        sExpWarn:"⚠️ قارب الانتهاء", sExpBad:"🔴 منتهي",
        rTitle:"مركز التقارير", rBtn:"تحميل", rClose:"إغلاق", rFrom:"من:", rTo:"إلى:",
        rUsage:"سجل الاستهلاك", rInv:"المخزون الحالي",
        wCode:"اسم الموظف:", bConfirm:"تأكيد", bCancel:"إلغاء",
        stock:"المخزون", use:"استخدام", out:"نفذ",
        search:"بحث...", successMsg:"تمت العملية بنجاح!",
        amountLabel:"الكمية:", workerRequired:"اسم الموظف مطلوب!",
        noData:"لا توجد بيانات", reportError:"خطأ في التقرير", reportSheetName:"تقرير",
        expLabel:"تاريخ الانتهاء:", expExpired:"منتهي الصلاحية", expDaysLeft:"يوم متبقي", expOk:"صالح", expNone:"غير محدد"
    }
};

let inventory = [];
let currentFilter = 'all';
let currentCategory = 'all';
let activeItem = null;
let currentLang = 'tr';

function t(key) { return TRANSLATIONS[currentLang][key] || key; }

function checkLogin() {
    if (document.getElementById('loginID').value === 'klinik' &&
        document.getElementById('loginPass').value === '102030') {
        document.getElementById('loginOverlay').style.display = 'none';
        loadData();
    }
}

async function loadData() {
    document.getElementById('loader').style.display = 'flex';
    try {
        const r = await fetch(SCRIPT_URL);
        inventory = await r.json();
        console.log("Sample item:", JSON.stringify(inventory[0])); // debug
        renderCategories();
        renderUI();
    } catch(e) { console.error(e); }
    document.getElementById('loader').style.display = 'none';
}

// ── Expiry helpers ────────────────────────────────────────────
function getExpiryInfo(expiryStr) {
    if (!expiryStr || expiryStr === "") return null;
    const exp = new Date(expiryStr);
    if (isNaN(exp.getTime())) return null;
    const today = new Date();
    today.setHours(0,0,0,0);
    exp.setHours(0,0,0,0);
    const diffDays = Math.round((exp - today) / (1000*60*60*24));
    return { date: exp, daysLeft: diffDays };
}

function expiryBadgeHTML(expiryStr) {
    const info = getExpiryInfo(expiryStr);
    if (!info) {
        return `<div class="expiry-row"><span class="expiry-badge expiry-none"><i class="fas fa-calendar"></i> ${t('expNone')}</span></div>`;
    }
    const dateFormatted = info.date.toLocaleDateString('tr-TR');
    if (info.daysLeft < 0) {
        return `<div class="expiry-row"><span class="expiry-badge expiry-bad"><i class="fas fa-times-circle"></i> ${t('expExpired')} — ${dateFormatted}</span></div>`;
    } else if (info.daysLeft <= 30) {
        return `<div class="expiry-row"><span class="expiry-badge expiry-warn"><i class="fas fa-exclamation-triangle"></i> ${info.daysLeft} ${t('expDaysLeft')} — ${dateFormatted}</span></div>`;
    } else {
        return `<div class="expiry-row"><span class="expiry-badge expiry-ok"><i class="fas fa-calendar-check"></i> ${dateFormatted}</span></div>`;
    }
}
// ─────────────────────────────────────────────────────────────

function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function renderCategories() {
    const row = document.getElementById('categoryRow');
    const catMap = {};
    inventory.forEach(item => {
        const cat = (item.kategori || '').trim();
        if (cat) catMap[cat] = (catMap[cat] || 0) + 1;
    });
    const categories = Object.keys(catMap);
    if (categories.length === 0) {
        document.querySelector('.category-section').style.display = 'none';
        return;
    }
    document.querySelector('.category-section').style.display = 'block';
    row.innerHTML = `
        <div class="cat-card ${currentCategory==='all'?'active':''}" onclick="setCategory('all')">
            <i class="fas fa-th-large"></i> ${t('catAll')}
            <span class="cat-count">${inventory.length}</span>
        </div>`;
    categories.forEach(cat => {
        row.innerHTML += `
            <div class="cat-card ${currentCategory===cat?'active':''}" onclick="setCategory('${escHtml(cat)}')">
                ${escHtml(cat)} <span class="cat-count">${catMap[cat]}</span>
            </div>`;
    });
}

function setCategory(cat) { currentCategory = cat; renderCategories(); renderUI(); }

function renderUI() {
    const grid = document.getElementById('invGrid');
    const search = document.getElementById('searchInp').value.toLowerCase();
    grid.innerHTML = '';
    let counts = { all:0, avail:0, crit:0, out:0, expwarn:0, expbad:0 };

    inventory.forEach(item => {
        const stock = Number(item.stock);
        const total = Number(item.total);
        const ratio = total > 0 ? Math.round((stock/total)*100) : 0;
        const isCrit   = ratio <= 25 && stock > 0;
        const isOut    = stock <= 0;
        const expInfo  = getExpiryInfo(item.expiry);
        const isExpWarn = expInfo && expInfo.daysLeft >= 0 && expInfo.daysLeft <= 30;
        const isExpBad  = expInfo && expInfo.daysLeft < 0;

        counts.all++;
        if (!isOut) counts.avail++;
        if (isCrit) counts.crit++;
        if (isOut)  counts.out++;
        if (isExpWarn) counts.expwarn++;
        if (isExpBad)  counts.expbad++;

        const itemCat  = (item.kategori || '').trim();
        const catMatch = currentCategory === 'all' || itemCat === currentCategory;

        const filterMatch =
            currentFilter === 'all'      ||
            (currentFilter === 'available' && !isOut)    ||
            (currentFilter === 'critical'  && isCrit)    ||
            (currentFilter === 'out'       && isOut)     ||
            (currentFilter === 'expiring'  && isExpWarn) ||
            (currentFilter === 'expired'   && isExpBad);

        if (!catMatch || !filterMatch) return;
        if (!item.name.toLowerCase().includes(search)) return;

        // border color priority: expired > low stock > warn > ok
        // border color = stock status only
        let borderColor = 'var(--success)';
        if (isCrit) borderColor = 'var(--warning)';
        if (isOut)  borderColor = 'var(--ruby-red)';

        grid.innerHTML += `
            <div class="card" style="border-top:5px solid ${borderColor}">
                <div style="display:flex;justify-content:space-between;align-items:center;">
                    <small style="color:var(--text-dim)">#${item.serial}</small>
                    <div style="display:flex;align-items:center;gap:8px;">
                        ${itemCat ? `<span style="background:var(--input-bg);color:var(--text-dim);border-radius:8px;padding:2px 10px;font-size:11px;font-weight:600;">${escHtml(itemCat)}</span>` : ''}
                        <b>${ratio}%</b>
                    </div>
                </div>
                <h3 style="margin:10px 0 4px;">${escHtml(item.name)}</h3>
                ${expiryBadgeHTML(item.expiry)}
                <div class="progress-container">
                    <div class="progress-bar" style="width:${ratio}%;background:${ratio<=25?'var(--ruby-red)':'var(--success)'}"></div>
                </div>
                <p style="margin:0 0 12px;color:var(--text-dim);font-size:14px;">${t('stock')}: <b style="color:var(--text-main)">${stock} / ${total}</b></p>
                <div class="qty-wrapper">
                    <button class="qty-btn" onclick="adjQty('${item.serial}',-1,${stock})">−</button>
                    <input type="number" class="qty-input" id="q-${item.serial}" value="1" onchange="validateQty(this,${stock})">
                    <button class="qty-btn" onclick="adjQty('${item.serial}',1,${stock})">+</button>
                </div>
                <button class="btn-action" ${isOut?'disabled':''} onclick="openOrder(${item.serial})">
                    ${isOut ? t('out') : t('use')}
                </button>
            </div>`;
    });

    document.getElementById('c-all').innerText    = counts.all;
    document.getElementById('c-avail').innerText  = counts.avail;
    document.getElementById('c-crit').innerText   = counts.crit;
    document.getElementById('c-out').innerText    = counts.out;
    document.getElementById('c-expwarn').innerText = counts.expwarn;
    document.getElementById('c-expbad').innerText  = counts.expbad;
}

function adjQty(id, d, max) {
    const i = document.getElementById(`q-${id}`);
    let v = (parseInt(i.value) || 1) + d;
    if (v < 1) v = 1; if (v > max) v = max;
    i.value = v;
}
function validateQty(input, max) {
    let v = parseInt(input.value);
    if (isNaN(v) || v < 1) v = 1;
    if (v > max) v = max;
    input.value = v;
}

function openOrder(s) {
    const item = inventory.find(i => i.serial == s);
    const qtyInput = document.getElementById(`q-${s}`);
    let qty = parseInt(qtyInput.value) || 1;
    if (qty > item.stock) qty = item.stock;
    if (qty < 1) qty = 1;
    activeItem = { ...item, q: qty };

    document.getElementById('mMedName').innerText  = item.name;
    document.getElementById('mQtyText').innerText  = `${t('amountLabel')} ${qty}`;

    // expiry warning in modal
    const expInfo = getExpiryInfo(item.expiry);
    const wrap = document.getElementById('mExpiryWrap');
    if (!expInfo) {
        wrap.innerHTML = '';
    } else if (expInfo.daysLeft < 0) {
        wrap.innerHTML = `<span class="expiry-badge expiry-bad"><i class="fas fa-times-circle"></i> ${t('expExpired')}</span>`;
    } else if (expInfo.daysLeft <= 30) {
        wrap.innerHTML = `<span class="expiry-badge expiry-warn"><i class="fas fa-exclamation-triangle"></i> ${expInfo.daysLeft} ${t('expDaysLeft')}</span>`;
    } else {
        wrap.innerHTML = `<span class="expiry-badge expiry-ok"><i class="fas fa-calendar-check"></i> ${t('expOk')}</span>`;
    }

    document.getElementById('orderOverlay').style.display = 'flex';
}

async function processOrder() {
    const code = document.getElementById('workerCode').value;
    if (!code) return alert(t('workerRequired'));
    inventory.find(i => i.serial == activeItem.serial).stock -= activeItem.q;
    renderUI();
    closeOrder();
    document.getElementById('toastMsg').innerText = t('successMsg');
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
    fetch(SCRIPT_URL, { method:'POST', mode:'no-cors', body: JSON.stringify({ workerCode: code, serial: activeItem.serial, qty: activeItem.q }) });
}

async function generateReport() {
    const type = document.getElementById('reportType').value;
    const from = document.getElementById('dateFrom').value;
    const to   = document.getElementById('dateTo').value;
    document.getElementById('loader').style.display = 'flex';
    try {
        const r = await fetch(`${SCRIPT_URL}?action=${type}&from=${from}&to=${to}`);
        const result = await r.json();
        if (!result || result.length === 0) { alert(t('noData')); }
        else {
            const ws = XLSX.utils.json_to_sheet(result);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, t('reportSheetName'));
            XLSX.writeFile(wb, `${type}_rapor_${new Date().toISOString().slice(0,10)}.xlsx`);
        }
    } catch(e) { alert(t('reportError')); }
    document.getElementById('loader').style.display = 'none';
}

function openReports()  { document.getElementById('reportOverlay').style.display = 'flex'; }
function closeReports() { document.getElementById('reportOverlay').style.display = 'none'; }
function closeOrder()   { document.getElementById('orderOverlay').style.display = 'none'; document.getElementById('workerCode').value = ''; }
function toggleDateGroup() { document.getElementById('dateGroup').style.display = document.getElementById('reportType').value === 'usage' ? 'block' : 'none'; }
function toggleTheme() { document.documentElement.setAttribute('data-theme', document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'); }

function setFilter(f, el) {
    currentFilter = f;
    document.querySelectorAll('.stat-item').forEach(i => i.classList.remove('active'));
    el.classList.add('active');
    renderUI();
}

function updateLang() {
    currentLang = document.getElementById('langMenu').value;
    document.body.setAttribute('lang', currentLang);
    document.querySelectorAll('[data-key]').forEach(el => {
        const k = el.getAttribute('data-key');
        if (TRANSLATIONS[currentLang][k]) el.innerText = TRANSLATIONS[currentLang][k];
    });
    document.querySelectorAll('[data-key-opt]').forEach(el => {
        const k = el.getAttribute('data-key-opt');
        if (TRANSLATIONS[currentLang][k]) el.innerText = TRANSLATIONS[currentLang][k];
    });
    document.getElementById('searchInp').placeholder = t('search');
    renderCategories();
    renderUI();
}
</script>
